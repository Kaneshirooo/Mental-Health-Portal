<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scrum Process | PSU Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #ccd6e0;
            --primary: #4f46e5;
            --secondary: #ef4444;
            --accent: #22c55e;
            --text: #1e293b;
            --text-muted: #64748b;
        }

        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: 0.3s;
        }

        header {
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .actions { display: flex; gap: 1rem; }
        .btn {
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
        }

        main {
            flex: 1;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .scrum-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            z-index: 10;
        }

        /* Elements */
        .node {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }

        .icon { font-size: 2.5rem; }
        .label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }

        .backlog-item {
            width: 50px; height: 65px;
            background: #6366f1;
            border: 2.5px solid var(--text);
            border-radius: 2px;
            position: relative;
        }
        .backlog-item::after {
            content: '';
            position: absolute;
            top: 5px; left: 5px; right: 5px;
            height: 3px; background: rgba(255,255,255,0.3);
            box-shadow: 0 8px 0 rgba(255,255,255,0.3), 0 16px 0 rgba(255,255,255,0.3);
        }

        .sprint-backlog {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .sprint-bar {
            width: 45px; height: 10px;
            background: #ef4444;
            border: 2px solid var(--text);
        }

        /* The Main Loop */
        .main-loop-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .loop-svg {
            position: absolute;
            width: 100%; height: 100%;
        }

        .center-gear {
            width: 120px; height: 120px;
            background: white;
            border: 6px solid #4f46e5;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 20;
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.2);
        }

        .gear-text { font-size: 1.2rem; font-weight: 800; color: #4f46e5; line-height: 1.1; }

        .daily-label {
            position: absolute;
            top: 10px; right: 0px;
            text-align: center;
        }

        .arrow-connector {
            width: 60px; height: 30px;
            display: flex; align-items: center;
            font-size: 2rem; color: #4f46e5;
        }

        .product-box {
            width: 80px; height: 80px;
            background: #f59e0b;
            border: 3px solid var(--text);
            position: relative;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem;
        }
        .product-box::before { content: '🎁'; }

        .caption { margin-top: 5rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); font-size: 1.2rem; }
    </style>
</head>
<body>
    <header>
        <div>
            <h1 style="font-size:1.4rem">Agile Scrum Methodology</h1>
            <p style="color:var(--text-muted); font-size:0.8rem">PSU Portal Project Framework</p>
        </div>
        <div class="actions">
            <button class="btn" id="toggleTheme">Toggle Theme</button>
            <button class="btn btn-primary" id="exportPNG">Export PNG</button>
        </div>
    </header>

    <main id="capture-area">
        <div class="scrum-wrapper">
            <!-- Vision -->
            <div class="node">
                <div class="icon">💡</div>
                <div class="label">Vision</div>
            </div>

            <div class="arrow-connector">→</div>

            <!-- User Stories -->
            <div class="node">
                <div style="display:flex; gap:5px;">
                    <div class="backlog-item"></div>
                    <div class="backlog-item" style="margin-top:10px"></div>
                    <div class="backlog-item"></div>
                </div>
                <div class="label">User Stories</div>
            </div>

            <div class="arrow-connector">→</div>

            <!-- Sprint Backlog -->
            <div class="node">
                <div class="sprint-backlog">
                    <div class="sprint-bar"></div>
                    <div class="sprint-bar"></div>
                    <div class="sprint-bar"></div>
                    <div class="sprint-bar"></div>
                    <div class="sprint-bar"></div>
                </div>
                <div class="label">Sprint Backlog</div>
            </div>

            <div class="arrow-connector" style="color:#f59e0b">→</div>

            <!-- Main Scrum Loop -->
            <div class="main-loop-container">
                <svg class="loop-svg" viewBox="0 0 200 200">
                    <!-- Main Cycle (Blue to Red) -->
                    <path d="M 100,20 A 80,80 0 1,1 99.9,20" fill="none" stroke="#4f46e5" stroke-width="15" stroke-linecap="round" />
                    <!-- Arrowheads -->
                    <polygon points="100,5 120,20 100,35" fill="#4f46e5" transform="rotate(45, 100, 100)" />
                    
                    <!-- Daily Standup Loop (Green) -->
                    <path d="M 170,50 A 30,30 0 1,1 170,110" fill="none" stroke="#22c55e" stroke-width="8" stroke-linecap="round" />
                    <polygon points="170,100 185,115 170,130" fill="#22c55e" />
                </svg>

                <div class="center-gear">
                    <div class="gear-text">2-4<br>WEEKS</div>
                </div>

                <div class="node" style="position:absolute; bottom:-25px; left:50%; transform:translateX(-50%)">
                    <div class="icon" style="font-size:2rem">👥</div>
                    <div class="label" style="font-size:0.85rem; color:var(--text); background:var(--surface); padding: 2px 6px; border-radius: 4px;">TEAM</div>
                </div>

                <div class="node" style="position:absolute; top:70px; left:-10px;">
                    <div class="icon" style="font-size:2rem">👤</div>
                    <div class="label" style="font-size:0.85rem; color:var(--text); background:var(--surface); padding: 2px 6px; border-radius: 4px;">SCRUM MASTER</div>
                </div>

                <div class="daily-label">
                    <div style="font-weight:800; color:#22c55e; font-size:0.9rem; text-shadow: 0 0 10px rgba(34,197,94,0.2);">24 HOURS</div>
                    <div style="display:flex; gap:4px; justify-content:center; margin-top:4px;">
                        <span style="font-size:1.2rem">👤</span><span style="font-size:1.2rem">👤</span><span style="font-size:1.2rem">👤</span>
                    </div>
                    <div class="label" style="font-size:0.85rem; color:var(--text); background:var(--surface); padding: 2px 6px; border-radius: 4px; margin-top:4px;">DAILY STAND-UP</div>
                </div>
            </div>

            <div class="arrow-connector" style="color:#4f46e5">→</div>

            <!-- Final Product -->
            <div class="node">
                <div class="product-box"></div>
                <div class="label">Product / Increment</div>
            </div>
        </div>

        <p class="caption">Figure 3.4.1 Agile Scrum Methodology</p>
    </main>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script>
        document.getElementById('toggleTheme').addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
        });
        document.getElementById('exportPNG').addEventListener('click', () => {
            html2canvas(document.getElementById('capture-area'), {
                backgroundColor: getComputedStyle(document.body).backgroundColor,
                scale: 2
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'scrum_methodology.png';
                link.href = canvas.toDataURL('image/png'); link.click();
            });
        });
    </script>
</body>
</html>
